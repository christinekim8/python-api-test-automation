name: WooCommerce API Automation CI/CD Pipeline

# Workflow triggers: Runs on every push or pull request to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-report:
    # Operating system for the runner
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # [Step 1] Checkout the repository code to the runner
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # [Step 2] Set up Docker Buildx for container orchestration
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # [Step 3] Ensure Docker Compose is available and up to date
      - name: Install/Verify Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      # [Step 4] Security: Inject GitHub Secrets into the .env file
      # This prevents sensitive credentials from being exposed in the source code
      - name: Create Environment File (.env)
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "CONSUMER_KEY=${{ secrets.CONSUMER_KEY }}" >> .env
          echo "CONSUMER_SECRET=${{ secrets.CONSUMER_SECRET }}" >> .env

# [Step 5] Orchestration: Infrastructure Setup, Environment Provisioning, and Test Execution
      - name: Spin up Containers and Run Automated Tests
        run: |
          # 1. Launch backend infrastructure (Database & WordPress) in detached mode
          docker-compose up -d db wordpress
          
          # 2. Health check: Allow services to fully initialize before configuration
          echo "Waiting for WordPress and MySQL services to stabilize..."
          sleep 50 
          
          # 3. Infrastructure Patch: Install WP-CLI and Configure Apache for REST API compatibility
          # This fixes the 404 Not Found error by enabling mod_rewrite and AllowOverride
          echo "Installing WP-CLI and configuring Apache web server..."
          docker exec woo-app sh -c "curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar && chmod +x wp-cli.phar && mv wp-cli.phar /usr/local/bin/wp"
          docker exec woo-app a2enmod rewrite
          docker exec woo-app sh -c "echo '<Directory /var/www/html/>\nAllowOverride All\n</Directory>' >> /etc/apache2/apache2.conf"
          docker exec woo-app service apache2 restart
          
          # 4. Automated Application Provisioning: Install WordPress and WooCommerce
          echo "Executing automated WordPress core installation..."
          docker exec woo-app wp core install --url="http://wordpress" --title="CI-Automation-Store" --admin_user="admin" --admin_password="password" --admin_email="test@example.com" --allow-root
          
          echo "Activating WooCommerce plugin..."
          docker exec woo-app wp plugin install woocommerce --activate --allow-root
          
          echo "Updating permalink structure to support REST API endpoints..."
          docker exec woo-app wp rewrite structure '/%postname%/' --hard --allow-root
          
          # 5. Dynamic Authentication Setup: Inject GitHub Secrets as WooCommerce API Keys
          # This fixes the 401 Unauthorized error by synchronizing keys between CI environment and Tests
          echo "Provisioning WooCommerce API credentials from GitHub Secrets..."
          docker exec woo-app wp woocommerce_api_key create \
            --user=admin \
            --description="CI-CD-Access-Key" \
            --consumer_key=${{ secrets.CONSUMER_KEY }} \
            --consumer_secret=${{ secrets.CONSUMER_SECRET }} \
            --permissions=read_write \
            --allow-root
          
          # 6. Test Execution: Trigger the Pytest suite within the test-runner container
          echo "Starting the Pytest automation suite..."
          docker-compose up --exit-code-from test-runner

      # [Step 6] Reporting: Generate Allure visual report from test results
      - name: Process Allure Report
        if: always() # Ensure reporting runs even if tests fail
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_history: allure-history

      # [Step 7] Deployment: Host the Allure report on GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history