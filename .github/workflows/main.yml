name: WooCommerce API Automation CI/CD Pipeline

# Workflow triggers: Runs on every push or pull request to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-report:
    # Operating system for the runner
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # [Step 1] Checkout the repository code to the runner
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # [Step 2] Set up Docker Buildx for container orchestration
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # [Step 3] Ensure Docker Compose is available and up to date
      - name: Install/Verify Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      # [Step 4] Security: Inject GitHub Secrets into the .env file
      # This prevents sensitive credentials from being exposed in the source code
      - name: Create Environment File (.env)
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "CONSUMER_KEY=${{ secrets.CONSUMER_KEY }}" >> .env
          echo "CONSUMER_SECRET=${{ secrets.CONSUMER_SECRET }}" >> .env

      # [Step 5] Orchestration: Setup Infrastructure with Safe Restart Logic
      - name: Spin up Containers and Run Automated Tests
        run: |
          # 1. Start core services
          docker-compose up -d db wordpress
          
          # 2. Health check: Wait for stabilization
          echo "Waiting for WordPress service to stabilize..."
          sleep 50 
          
          # 3. Environment Provisioning: Install WP-CLI and Configure Apache
          echo "Installing WP-CLI and enabling Apache rewrite module..."
          docker exec woo-app sh -c "curl -O https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar && chmod +x wp-cli.phar && mv wp-cli.phar /usr/local/bin/wp"
          docker exec woo-app a2enmod rewrite
          docker exec woo-app sh -c "echo '<Directory /var/www/html/>\nAllowOverride All\n</Directory>' >> /etc/apache2/apache2.conf"
          
          # 4. Safe Restart: Restart the container from the host to apply Apache changes without crashing
          echo "Restarting WordPress container safely..."
          docker-compose restart wordpress
          sleep 20 # Wait for restart
          
          # 5. Application Setup & API Key Injection
          echo "Setting up WordPress and WooCommerce API keys..."
          docker exec woo-app wp core install --url="http://wordpress" --title="Automation-Store" --admin_user="admin" --admin_password="password" --admin_email="test@example.com" --allow-root
          docker exec woo-app wp plugin install woocommerce --activate --allow-root
          docker exec woo-app wp rewrite structure '/%postname%/' --hard --allow-root
          docker exec woo-app wp woocommerce_api_key create --user=admin --description="CI-Key" --consumer_key=${{ secrets.CONSUMER_KEY }} --consumer_secret=${{ secrets.CONSUMER_SECRET }} --permissions=read_write --allow-root
          
          # 6. Final Step: Execute Pytest suite
          echo "Launching Automated Test Suite..."
          docker-compose up --exit-code-from test-runner

      # [Step 6] Reporting: Generate Allure visual report from test results
      - name: Process Allure Report
        if: always() # Ensure reporting runs even if tests fail
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_history: allure-history

      # [Step 7] Deployment: Host the Allure report on GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history