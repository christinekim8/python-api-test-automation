name: WooCommerce API Automation CI/CD Pipeline

# Workflow triggers: Runs on every push or pull request to the main branch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-report:
    # Operating system for the runner
    runs-on: ubuntu-latest

    steps:
      # [Step 1] Checkout the repository code to the runner
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # [Step 2] Set up Docker Buildx for container orchestration
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # [Step 3] Ensure Docker Compose is available and up to date
      - name: Install/Verify Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      # [Step 4] Security: Inject GitHub Secrets into the .env file
      # This prevents sensitive credentials from being exposed in the source code
      - name: Create Environment File (.env)
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "CONSUMER_KEY=${{ secrets.CONSUMER_KEY }}" >> .env
          echo "CONSUMER_SECRET=${{ secrets.CONSUMER_SECRET }}" >> .env

      # [Step 5] Orchestration: Launch containers and execute test suite
      - name: Spin up Containers and Run Automated Tests
        run: |
          # Launch infrastructure (DB & WordPress) in detached mode
          docker-compose up -d db wordpress
          
          # Health check: Wait for WordPress to be fully initialized
          echo "Waiting for WordPress service to stabilize..."
          sleep 30 
          
          # Execute the test-runner and capture the exit code for CI status
          docker-compose up --exit-code-from test-runner

      # [Step 6] Reporting: Generate Allure visual report from test results
      - name: Process Allure Report
        if: always() # Ensure reporting runs even if tests fail
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_history: allure-history

      # [Step 7] Deployment: Host the Allure report on GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history