services:
  # Database service
  db:
    image: mysql:8.0
    container_name: woo-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: wordpress
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - woo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  # WordPress + WooCommerce service (system under test)
  wordpress:
    image: wordpress:latest
    container_name: woo-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: always
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: user
      WORDPRESS_DB_PASSWORD: password
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: "define('FORCE_SSL_ADMIN', false);"
    volumes:
      - wp_data:/var/www/html
      - ./docker-config/.htaccess:/var/www/html/.htaccess
      - ./docker-config/apache.conf:/etc/apache2/sites-enabled/000-default.conf
    networks:
      - woo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 10

  # phpMyAdmin service for database inspection
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: woo-phpmyadmin
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: password
    networks:
      - woo-network

  # WP-CLI setup service: installs WordPress, WooCommerce, and generates API keys
  wp-setup:
    image: wordpress:cli
    container_name: woo-setup
    user: root
    restart: "no"
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      wordpress:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: user
      WORDPRESS_DB_PASSWORD: password
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wp_data:/var/www/html
      - ./scripts/setup-wordpress.sh:/setup.sh
      - shared_data:/shared
    entrypoint: ["/bin/bash", "-c", "sed -i 's/\\r//' /setup.sh && /bin/bash /setup.sh"]
    networks:
      - woo-network

  # Test runner service: executes pytest and generates Allure report
  test-runner:
    build: .
    container_name: woo-test-runner
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - wp-setup
    volumes:
      - ./tests:/app/tests
      - ./allure-results:/app/allure-results
      - ./allure-report:/app/allure-report
      - shared_data:/shared
    command:
      - sh
      - -c
      - "until [ -f /shared/ready ]; do sleep 2; done && cat /shared/.env && cp /shared/.env /app/.env && pytest tests/ --alluredir=/app/allure-results -v && allure generate /app/allure-results --clean -o /app/allure-report"
    networks:
      - woo-network

# Persistent volumes for data integrity across restarts
volumes:
  db_data:
  wp_data:
  shared_data:

# Isolated network for secure inter-service communication
networks:
  woo-network:
    driver: bridge